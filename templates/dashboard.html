<!DOCTYPE html>
<html>

<head>

    <title>Dashboard</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<body>

    <nav class="navbar navbar-dark bg-success p-3">

        <div class="container">

            <h2 class="text-white">
                Welcome {{ user['username'] }}
            </h2>

            <a href="/logout" class="btn btn-light">
                Logout
            </a>

        </div>

    </nav>

    <div class="container mt-5">

        <div class="card p-4 shadow">

            <h3>Your Stars ⭐</h3>

            <h1>{{ user['stars'] }}</h1>

            <h4>{{ badge }}</h4>

            <a href="/pickup" class="btn btn-success mt-3">
                Book Pickup
            </a>

        </div>

        <div class="card p-4 mt-4 shadow">

            <h3>Transaction History</h3>

            <table class="table table-bordered">

                <tr>

                    <th>Category</th>
                    <th>Date</th>
                    <th>Time Slot</th>
                    <th>Stars</th>

                </tr>

                {% for t in transactions %}

                <tr>

                    <td>{{ t['category'] }}</td>
                    <td>{{ t['pickup_date'] }}</td>
                    <td>{{ t['time_slot'] }}</td>
                    <td>{{ t['stars_earned'] }}</td>

                </tr>

                {% endfor %}

            </table>

        </div>

    </div>

</body>

</html>
