<!DOCTYPE html>
<html>

<head>

    <title>Book Pickup</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card p-4 shadow">

            <h2>Book E-Waste Pickup</h2>

            <form method="POST">

                <select name="category" class="form-control mb-3">

                    <option>Mobile</option>
                    <option>Laptop</option>
                    <option>Battery</option>
                    <option>Charger</option>
                    <option>Earphones</option>
                    <option>Television</option>
                    <option>Printer</option>

                </select>

                <input type="date" name="pickup_date" class="form-control mb-3" required>

                <select name="time_slot" class="form-control mb-3">

                    <option>9 AM - 11 AM</option>
                    <option>11 AM - 1 PM</option>
                    <option>2 PM - 4 PM</option>

                </select>

                <button class="btn btn-success w-100">
                    Confirm Pickup
                </button>

            </form>

        </div>

    </div>

</body>

</html>
